<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hermes Glass Terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020403;
      --fg: #d8ffe2;
      --muted: #78a885;
      --accent: #62ff8e;
      --warn: #ffd166;
      --err: #ff6b6b;
      --panel: rgba(0, 24, 8, 0.72);
      --border: rgba(98,255,142,0.22);
    }
    html, body { margin: 0; height: 100%; background: radial-gradient(circle at 50% 35%, #092110, var(--bg) 60%); color: var(--fg); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    body { display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hud { width: min(980px, 100vw); height: min(620px, 100vh); box-sizing: border-box; padding: 18px; display: grid; grid-template-rows: auto 1fr auto; gap: 10px; }
    .topbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; color: var(--muted); font-size: 13px; }
    .brand { color: var(--accent); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .pill { border: 1px solid var(--border); background: var(--panel); border-radius: 999px; padding: 5px 10px; }
    .screen { border: 1px solid var(--border); background: linear-gradient(180deg, rgba(0,18,6,.86), rgba(0,8,3,.92)); border-radius: 18px; padding: 14px; overflow: hidden; box-shadow: 0 0 50px rgba(98,255,142,.08), inset 0 0 24px rgba(98,255,142,.04); position: relative; }
    .screen::after { content: ""; position:absolute; inset:0; pointer-events:none; background: repeating-linear-gradient(180deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px); mix-blend-mode: screen; opacity:.6; }
    #log { position: relative; z-index: 1; white-space: pre-wrap; word-break: break-word; overflow: auto; height: 100%; line-height: 1.42; font-size: clamp(13px, 2.25vw, 18px); scrollbar-width: thin; }
    .line { margin: 0 0 4px; }
    .agent { color: var(--fg); }
    .term { color: #b7d7ff; }
    .status { color: var(--warn); }
    .error { color: var(--err); }
    .inputbar { display: grid; grid-template-columns: 110px 1fr 54px 62px 86px; gap: 8px; }
    #rec { display:none; color: var(--err); border-color: rgba(255,107,107,.45); }
    #rec.on { display:inline-block; animation: blink 1s steps(2, start) infinite; }
    @keyframes blink { 50% { opacity: .25; } }
    input, select, button { font: inherit; border-radius: 12px; border: 1px solid var(--border); background: rgba(0, 15, 6, .9); color: var(--fg); padding: 11px 12px; outline: none; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(98,255,142,.13); }
    button { cursor: pointer; color: #001906; background: var(--accent); border: 0; font-weight: 700; }
    button.secondary { color: var(--fg); background: rgba(98,255,142,.1); border: 1px solid var(--border); }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
    @media (max-width: 640px) {
      .hud { padding: 8px; height: 100vh; }
      .inputbar { grid-template-columns: 76px 1fr 44px 48px 56px; }
      .controls { grid-template-columns: 1fr 1fr; }
      .topbar { font-size: 11px; }
    }
    /* Rokid / glasses mode: 480x640 WebView, maximize readable terminal area. */
    body.glasses { align-items: stretch; justify-content: stretch; background: #020403; }
    body.glasses .hud { width: 100vw; height: 100vh; padding: 4px; gap: 4px; grid-template-rows: 22px 1fr 36px; }
    body.glasses .topbar { font-size: 9px; gap: 4px; min-width: 0; overflow: hidden; }
    body.glasses .brand { font-size: 9px; letter-spacing: .02em; white-space: nowrap; }
    body.glasses .pill { padding: 2px 5px; border-radius: 7px; white-space: nowrap; }
    body.glasses #conn { max-width: 72px; overflow: hidden; text-overflow: ellipsis; }
    body.glasses #project { width: 56px !important; font-size: 9px; padding: 0 3px !important; }
    body.glasses .screen { border-radius: 8px; padding: 6px; }
    body.glasses #log { font-size: 10.5px; line-height: 1.22; }
    body.glasses .inputbar { grid-template-columns: 54px 1fr 34px 36px 38px; gap: 3px; }
    body.glasses input, body.glasses select, body.glasses button { font-size: 10px; padding: 7px 6px; border-radius: 7px; min-width: 0; }
    body.glasses .controls { display: none; }
  </style>
</head>
<body>
  <main class="hud">
    <div class="topbar">
      <span class="brand">Hermes Glass Terminal</span>
      <span id="conn" class="pill">connecting…</span>
      <span id="rec" class="pill">● REC</span>
      <span class="pill">project: <input id="project" value="default" style="width:110px;padding:2px 6px;border-radius:8px" /></span>
    </div>
    <section class="screen" aria-label="terminal output"><div id="log"></div></section>
    <section>
      <div class="inputbar">
        <select id="mode">
          <option value="agent_prompt">Hermes</option>
          <option value="claude_prompt">Claude</option>
          <option value="shell_command">Terminal</option>
        </select>
        <input id="input" autocomplete="off" placeholder="Hermes / Claude prompt, Terminal command, or /open URL…" />
        <button id="mic" title="Voice input">Mic</button>
        <button id="voiceMode" title="Voice mode: edit or auto-send to Claude">Edit</button>
        <button id="send">Send</button>
      </div>
      <div class="controls">
        <button class="secondary" data-preset="agent_prompt|請用一句話確認 Rokid terminal 已連上 Hermes。">Test Hermes</button>
        <button class="secondary" data-preset="shell_command|pwd && ls -la | head">Test Terminal</button>
        <button class="secondary" id="clear">Clear HUD</button>
      </div>
    </section>
  </main>
<script>
const log = document.getElementById('log');
if (new URLSearchParams(location.search).has('glasses')) document.body.classList.add('glasses');
const conn = document.getElementById('conn');
const rec = document.getElementById('rec');
const mode = document.getElementById('mode');
const input = document.getElementById('input');
const project = document.getElementById('project');
const mic = document.getElementById('mic');
const voiceMode = document.getElementById('voiceMode');
const send = document.getElementById('send');
let ws;
let mediaRecorder;
let mediaChunks = [];
let webVoiceRecording = false;
let voiceAutoSend = false;
function add(text, cls='line') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
function append(text, cls='agent') {
  let last = log.lastElementChild;
  if (!last || !last.classList.contains(cls)) {
    last = document.createElement('div');
    last.className = 'line ' + cls;
    log.appendChild(last);
  }
  last.textContent += text;
  log.scrollTop = log.scrollHeight;
}
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/glass`);
  ws.onopen = () => { conn.textContent = 'connected'; conn.style.color = 'var(--accent)'; };
  ws.onclose = () => { conn.textContent = 'disconnected / retrying'; conn.style.color = 'var(--err)'; setTimeout(connect, 1200); };
  ws.onerror = () => { conn.textContent = 'error'; conn.style.color = 'var(--err)'; };
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'hello') add(`[bridge] connected client=${m.client_id}\nworkspace=${m.workspace}`, 'status');
    else if (m.type.includes('error')) add(`[error] ${m.text}`, 'error');
    else if (m.type.includes('status') || m.type.endsWith('start') || m.type === 'info') add(`[${m.type}] ${m.text || m.project || ''}`, 'status');
    else if (m.type === 'agent_delta') append(m.text, 'agent');
    else if (m.type === 'claude_delta') append(m.text, 'agent');
    else if (m.type === 'term_delta') append(m.text, 'term');
    else if (m.type === 'term_done') add(m.text, 'status');
    else if (m.type === 'agent_done') add('\n[agent done]', 'status');
    else if (m.type === 'claude_done') add(`\n[claude exit ${m.exit_code}]`, m.exit_code === 0 ? 'status' : 'error');
    else add(`[${m.type}] ${m.text || JSON.stringify(m)}`, 'status');
  };
}
function labelForType(type) {
  if (type === 'shell_command') return '$';
  if (type === 'claude_prompt') return 'claude>';
  return '>';
}
function sendText(text, type = mode.value) {
  text = (text || '').trim();
  if (!text) return false;
  if (text.startsWith('/open ') || text.startsWith('/url ')) {
    const url = text.replace(/^\/(open|url)\s+/, '').trim();
    add(`[open] ${url}`, 'status');
    input.value = '';
    location.href = url;
    return true;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) { add('[error] bridge not connected', 'error'); return false; }
  add(`${labelForType(type)} ${text}`, type === 'shell_command' ? 'term' : 'agent');
  const payload = type === 'shell_command'
    ? {type, command: text, project: project.value}
    : {type, text, project: project.value};
  ws.send(JSON.stringify(payload));
  input.value = '';
  return true;
}
function submit() {
  return sendText(input.value.trim(), mode.value);
}
function handleVoiceTranscript(text, source='voice', meta='') {
  text = (text || '').trim();
  if (!text) { add(`[${source}] empty transcript${meta ? ' ' + meta : ''}`, 'status'); focusInput(); return; }
  input.value = text;
  add(`[${source}] ${text}${meta ? ' ' + meta : ''}`, 'status');
  if (voiceAutoSend) {
    mode.value = 'claude_prompt';
    add(`[${source}] auto-send → Claude`, 'status');
    sendText(text, 'claude_prompt');
  } else {
    focusInput();
  }
}
function setRecordingUi(on, label='') {
  webVoiceRecording = !!on;
  rec.classList.toggle('on', !!on);
  mic.textContent = on ? 'Stop' : 'Mic';
  if (label) add(label, 'status');
}
function focusInput() {
  setTimeout(() => input.focus({preventScroll: true}), 80);
}
function toggleMode() {
  const order = ['agent_prompt', 'claude_prompt', 'shell_command'];
  mode.value = order[(order.indexOf(mode.value) + 1) % order.length];
  const label = mode.value === 'agent_prompt' ? 'Hermes' : mode.value === 'claude_prompt' ? 'Claude' : 'Terminal';
  add(`[mode] ${label}`, 'status');
  focusInput();
}
async function startWebVoiceRecording() {
  try {
    if (webVoiceRecording && mediaRecorder) { mediaRecorder.stop(); return; }
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaChunks = [];
    mediaRecorder = new MediaRecorder(stream, mime ? {mimeType: mime} : undefined);
    mediaRecorder.ondataavailable = e => { if (e.data && e.data.size) mediaChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      setRecordingUi(false);
      stream.getTracks().forEach(t => t.stop());
      add('[voice] transcribing on Mac…', 'status');
      const blob = new Blob(mediaChunks, {type: mediaRecorder.mimeType || 'audio/webm'});
      const started = Date.now();
      const resp = await fetch('/stt', {method: 'POST', headers: {'Content-Type': blob.type}, body: blob});
      const data = await resp.json();
      if (data.ok) {
        const ms = data.elapsed_ms || (Date.now() - started);
        handleVoiceTranscript(data.text || '', 'voice', `(${ms}ms)`);
      }
      else add(`[voice error] ${data.error}`, 'error');
    };
    mediaRecorder.start();
    setRecordingUi(true, `[voice] recording… stop to ${voiceAutoSend ? 'send Claude' : 'edit text'}`);
  } catch (err) {
    setRecordingUi(false);
    add(`[voice error] ${err.name || err}`, 'error');
  }
}
const USE_NATIVE_VOICE = true; // Android wrapper uses glasses-side SpeechRecognizer; do not use AudioRecord/Mac Whisper first.
function setVoiceAuto(next) {
  voiceAutoSend = !!next;
  voiceMode.textContent = voiceAutoSend ? 'Auto' : 'Edit';
  voiceMode.style.background = voiceAutoSend ? 'var(--warn)' : 'rgba(98,255,142,.16)';
  voiceMode.style.color = voiceAutoSend ? '#1b1100' : 'var(--fg)';
  add(`[voice mode] ${voiceAutoSend ? 'Auto-send to Claude' : 'Edit before send'}`, 'status');
  focusInput();
}
function toggleVoiceMode() { setVoiceAuto(!voiceAutoSend); }
function startVoiceInput() {
  if (USE_NATIVE_VOICE && window.AndroidBridge && AndroidBridge.startVoice) {
    add('[voice] listening…', 'status');
    AndroidBridge.startVoice();
    return;
  }
  if (webVoiceRecording) { startWebVoiceRecording(); return; }
  startWebVoiceRecording();
}
window.voiceNativeUnavailable = () => { add('[voice] native recognizer unavailable; using Mac Whisper', 'status'); startWebVoiceRecording(); };
window.voiceNativeRecording = on => setRecordingUi(!!on, on ? `[native mic] recording… stop to ${voiceAutoSend ? 'send Claude' : 'edit text'}` : '[native mic] stopped');
window.voiceNativeStats = text => add(`[native mic] ${text}`, 'status');
window.voiceStatus = text => add(`[voice] ${text}`, 'status');
window.voicePartial = text => { input.value = text; focusInput(); };
window.voiceText = text => handleVoiceTranscript(text, 'voice');
mic.onclick = startVoiceInput;
voiceMode.onclick = toggleVoiceMode;
send.onclick = submit;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); focusInput(); }
});
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'l') { e.preventDefault(); log.textContent = ''; focusInput(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'm') { e.preventDefault(); toggleMode(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') { e.preventDefault(); toggleVoiceMode(); return; }
  if ((e.ctrlKey || e.metaKey) && e.code === 'Space') { e.preventDefault(); startVoiceInput(); return; }
  if (e.key === 'Escape') { e.preventDefault(); focusInput(); return; }
  if (e.key === 'Tab') { e.preventDefault(); toggleMode(); return; }
  if (document.activeElement !== input && document.activeElement !== project && e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey) focusInput();
});
document.body.addEventListener('click', focusInput);
document.getElementById('clear').onclick = () => { log.textContent = ''; focusInput(); };
document.querySelectorAll('[data-preset]').forEach(btn => btn.onclick = () => {
  const [t, v] = btn.dataset.preset.split('|'); mode.value = t; input.value = v; submit(); focusInput();
});
add('HUD ready. Mic/Ctrl+Space=record, Edit/Auto or Ctrl+A=voice mode, Tab=agent mode.', 'status');
setVoiceAuto(false);
connect();
focusInput();
</script>
</body>
</html>
